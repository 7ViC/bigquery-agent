# ============================================================
# docker-compose.yml — Local dev with API + Dashboard
# ============================================================
version: "3.9"

services:
  api:
    build: .
    container_name: autoanalyst-api
    ports:
      - "${API_PORT:-8000}:8000"
    env_file: .env
    volumes:
      - ./config/service-account.json:/app/config/service-account.json:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  dashboard:
    build: .
    container_name: autoanalyst-dashboard
    ports:
      - "${DASHBOARD_PORT:-8501}:8501"
    env_file: .env
    environment:
      - API_HOST=api
    command: ["python", "-m", "streamlit", "run", "dashboard/app.py", "--server.port", "8501", "--server.headless", "true", "--server.address", "0.0.0.0"]
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
