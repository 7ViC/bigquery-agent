version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  json:
    format: "%(message)s"

handlers:
  console:
    class: logging.StreamHandler
    formatter: standard
    stream: ext://sys.stdout
  file:
    class: logging.handlers.RotatingFileHandler
    formatter: standard
    filename: autoanalyst.log
    maxBytes: 10485760
    backupCount: 3

loggers:
  autoanalyst:
    level: INFO
    handlers: [console, file]
    propagate: false
  uvicorn:
    level: INFO
    handlers: [console]

root:
  level: WARNING
  handlers: [console]
